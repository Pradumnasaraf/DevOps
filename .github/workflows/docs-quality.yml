name: Docs Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check README links
        run: npm run check:readme-links

      - name: Build docs site
        run: npm run build
